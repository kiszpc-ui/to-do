function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function toLocal(d){const o=d.getTimezoneOffset()*60000;return new Date(d-o).toISOString().slice(0,10);}
function todayISO(){return toLocal(new Date());}
function diffDays(ds){
  if(!ds)return null;
  const d=new Date(ds+"T00:00:00"),t=new Date();t.setHours(0,0,0,0);
  return Math.ceil((d-t)/86400000);
}

// 繰り返し：次の期限計算（期限日から順方向に計算）
function nextDeadline(deadline,rType,rVal){
  if(!deadline||!rType)return null;
  const base=new Date(deadline+"T00:00:00");
  const today=new Date();today.setHours(0,0,0,0);

  if(rType==="weekly"){
    // 期限+7日×n で今日より後になるまで
    const d=new Date(base);
    do{d.setDate(d.getDate()+7);}while(d<=today);
    return toLocal(d);
  }
  if(rType==="monthly"){
    // 期限の翌月同日（月末は丸める）
    const tgt=base.getDate();
    let y=base.getFullYear(),m=base.getMonth();
    for(let i=1;i<=24;i++){
      m++;if(m>11){m=0;y++;}
      const last=new Date(y,m+1,0).getDate();
      const d=new Date(y,m,Math.min(tgt,last));
      if(d>today)return toLocal(d);
    }
    return null;
  }
  if(rType==="custom"){
    const rv=rVal||"";
    if(rv.startsWith("ndays:")){
      const n=parseInt(rv.split(":")[1])||1;
      const d=new Date(base);
      do{d.setDate(d.getDate()+n);}while(d<=today);
      return toLocal(d);
    }
    if(rv.startsWith("nweeks:")){
      const n=parseInt(rv.split(":")[1])||1;
      const d=new Date(base);
      do{d.setDate(d.getDate()+n*7);}while(d<=today);
      return toLocal(d);
    }
    if(rv.startsWith("nmonths:")){
      const n=parseInt(rv.split(":")[1])||1;
      const tgt=base.getDate();
      let y=base.getFullYear(),m=base.getMonth();
      for(let i=0;i<24;i++){
        m+=n;while(m>11){m-=12;y++;}
        const last=new Date(y,m+1,0).getDate();
        const d=new Date(y,m,Math.min(tgt,last));
        if(d>today)return toLocal(d);
      }
      return null;
    }
    if(rv.startsWith("nth:")){
      const parts=rv.split(":");
      const nthW=parseInt(parts[1]),wd=parseInt(parts[2]);
      let y=base.getFullYear(),m=base.getMonth();
      for(let i=1;i<=24;i++){
        m++;if(m>11){m=0;y++;}
        const first=new Date(y,m,1);
        let cnt=0;
        for(let d=0;d<31;d++){
          const dd=new Date(y,m,1+d);
          if(dd.getMonth()!==m)break;
          if(dd.getDay()===wd){if(cnt===nthW){if(dd>today)return toLocal(dd);break;}cnt++;}
        }
      }
      return null;
    }
    // 曜日指定：翌日以降の次の該当曜日
    const days=rv.split(",").map(Number).filter(n=>!isNaN(n));
    if(days.length===0)return null;
    const d=new Date(today);d.setDate(d.getDate()+1);
    for(let i=0;i<14;i++){if(days.includes(d.getDay()))return toLocal(d);d.setDate(d.getDate()+1);}
  }
  return null;
}

function repeatLabel(rType,rVal){
  if(!rType)return null;
  if(rType==="weekly")return "毎週";
  if(rType==="monthly")return "毎月";
  if(rType==="custom"){
    const rv=rVal||"";
    if(rv.startsWith("ndays:"))return `${rv.split(":")[1]}日毎`;
    if(rv.startsWith("nweeks:"))return `${rv.split(":")[1]}週毎`;
    if(rv.startsWith("nmonths:"))return `${rv.split(":")[1]}ヶ月毎`;
    if(rv.startsWith("nth:")){const p=rv.split(":");return `第${parseInt(p[1])+1}週の${WD[parseInt(p[2])]}曜日`;}
    const days=rv.split(",").map(Number).filter(n=>!isNaN(n));
    if(days.length>0)return "毎週"+days.map(d=>WD[d]).join("・");
  }
  return null;
}

function RepeatSel({rType,setRType,rVal,setRVal}){

        <option value="">なし</option><option value="weekly">毎週</option>
        <option value="monthly">毎月</option><option value="custom">カスタム</option>
      </select>
      {rType==="custom"&&<div style={{background:"#f9f9f9",borderRadius:8,padding:"10px"}}>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
          {[["weekdays","曜日"],["ndays","◯日毎"],["nweeks","◯週毎"],["nmonths","◯ヶ月毎"],["nth","第◯週"]].map(([m,l])=>(
            <button key={m} onClick={()=>{setMode(m);upd(m,nd,nw,nm,ntw,ntd,sds);}}
              style={{padding:"3px 8px",borderRadius:20,border:`1px solid ${mode===m?"#6366f1":"#ddd"}`,

          ))}
        </div>
        {mode==="weekdays"&&<div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {WD.map((d,i)=>{const on=sds.includes(i);return(
            <button key={i} onClick={()=>{const n=on?sds.filter(x=>x!==i):[...sds,i];setSds(n);upd("weekdays",nd,nw,nm,ntw,ntd,n);}}

              background:on?"#6366f118":"transparent",color:on?"#6366f1":"#666",fontSize:11,cursor:"pointer"}}>{d}</button>
          );})}
        </div>}
        {mode==="ndays"&&<div style={{display:"flex",alignItems:"center",gap:6}}>
          <input type="number" min="1" max="365" value={nd} style={inp}
            onChange={e=>{setNd(e.target.value);upd("ndays",e.target.value,nw,nm,ntw,ntd,sds);}}/>
          <span style={{fontSize:12,color:"#666"}}>日毎</span>
        </div>}
        {mode==="nweeks"&&<div style={{display:"flex",alignItems:"center",gap:6}}>
          <input type="number" min="1" max="52" value={nw} style={inp}

          <span style={{fontSize:12,color:"#666"}}>週毎</span>

// カレンダーコンポーネント（スクロール制御を外部から）
function CalView({tasks,events,proj,daysBack,daysForward,showTasks,onTaskClick,onEventClick,onOverdueClick,scrollToRef}){
  const today=todayISO();
  const days=[];
  for(let i=-(daysBack||0);i<(daysForward||14);i++){
    const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+i);
    days.push({d,iso:toLocal(d)});
  }
  return(
    <div style={{flex:1,overflowY:"auto",padding:"8px 12px 100px"}}>
      {days.map(({d,iso})=>{
        const isToday=iso===today;
        const isSun=d.getDay()===0,isSat=d.getDay()===6,isHol=!!HOLIDAYS[iso];
        const dc=isToday?"#fff":(isSun||isHol)?"#ef4444":isSat?"#3b82f6":"#1a1a1a";
        const dayTasks=showTasks?tasks.filter(t=>t.deadline===iso).sort((a,b)=>(b.priority||0)-(a.priority||0)):[];
        const dayEvents=(events||[]).filter(e=>e.date===iso).sort((a,b)=>(a.time||"99").localeCompare(b.time||"99"));
        const allOverdue=isToday?tasks.filter(t=>{const df=diffDays(t.deadline);return df!==null&&df<0&&!t.done;}):[];
        const isEmpty=dayTasks.length===0&&dayEvents.length===0;
        return(
          <div key={iso} id={"day-"+iso} ref={isToday?scrollToRef:null}>
            <div style={{padding:"8px 0 6px"}}>
              <div onClick={()=>onEventClick({id:null,title:"",date:iso,time:"",note:""})}
                style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,
                background:isToday?"#1a1a1a":"transparent",
                borderRadius:isToday?8:0,padding:isToday?"6px 12px":"2px 4px",
                cursor:"pointer",marginLeft:isToday?-12:0,marginRight:isToday?-12:0,paddingLeft:isToday?12:4}}>
                <span style={{fontSize:14,fontWeight:700,color:dc}}>{d.getMonth()+1}/{d.getDate()}</span>
                <span style={{fontSize:10,color:isToday?"#aaa":(isSun||isHol)?"#ef4444":isSat?"#3b82f6":"#bbb"}}>
                  {WD[d.getDay()]}{isHol?" 🎌":""}
                </span>
                <div style={{flex:1}}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {dayEvents.map(ev=>(
                  <div key={ev.id} onClick={()=>onEventClick(ev)}
                    style={{background:"#fff",borderRadius:8,padding:"6px 10px",cursor:"pointer",border:"1.5px solid #1a1a1a"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      {ev.time&&<span style={{fontSize:10,color:"#1a1a1a",fontWeight:700,flexShrink:0}}>{ev.time}</span>}
                      <span style={{fontSize:12,flex:1,color:"#1a1a1a",fontWeight:500}}>{ev.title}</span>
                      <span style={{fontSize:9,color:"#888",flexShrink:0}}>予定</span>
                    </div>
                    {ev.note&&<div style={{fontSize:10,color:"#666",marginTop:3,whiteSpace:"pre-wrap"}}>{ev.note}</div>}
                  </div>
                ))}
                {isEmpty
                  ?<span style={{fontSize:11,color:"#ddd",alignSelf:"center",marginTop:2}}>—</span>
                  :dayTasks.map(task=>{
                    const p=proj(task.project_id);
                    const pc=task.priority===3?"#ef4444":task.priority===2?"#f97316":task.priority===1?"#10b981":"#e0e0e0";
                    return(
                      <div key={task.id} onClick={()=>onTaskClick(task)}
                        style={{background:"#f9f9f9",borderRadius:8,padding:"6px 10px",cursor:"pointer",
                        opacity:task.done?.4:1,borderLeft:`3px solid ${pc}`}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          {p&&<span style={{fontSize:10,color:p.color,background:p.color+"18",padding:"1px 5px",borderRadius:20,flexShrink:0}}>{p.name}</span>}
                          <span style={{fontSize:12,flex:1,textDecoration:task.done?"line-through":"none",color:task.done?"#bbb":"#1a1a1a"}}>{task.title}</span>
                          {task.priority>0&&<span style={{fontSize:9,fontWeight:700,color:pc,flexShrink:0}}>{task.priority===3?"高":task.priority===2?"中":"低"}</span>}
                        </div>
                        {task.note&&<div style={{fontSize:10,color:"#999",marginTop:2,whiteSpace:"pre-wrap"}}>{task.note}</div>}
                        {task.image_url&&<img src={task.image_url} alt="" onClick={e=>{e.stopPropagation();window.open(task.image_url,"_blank");}}
                          style={{width:48,height:48,objectFit:"cover",borderRadius:6,marginTop:4,display:"block",cursor:"pointer"}}/>}
                      </div>
                    );
                  })
                }
              </div>
            </div>
            <div style={{height:1,background:"#f0f0f0"}}/>
          </div>
        );
      })}
    </div>
  );
}

  const [scrollTarget,setScrollTarget]=useState("today"); // "today" or ISO date string
  const calScrollRef=useRef(null);

  // 起動時にデータ取得
  useEffect(()=>{
    Promise.all([
      SB.from("projects").select("*").order("position"),
      SB.from("tasks").select("*").order("created_at",{ascending:false}).limit(500),
      SB.from("events").select("*").order("date")
    ]).then(([{data:ps},{data:ts},{data:es}])=>{
      setProjects(ps||[]);setTasks(ts||[]);setEvents(es||[]);setLoading(false);
    });
    let pSub,tSub,eSub;
    const startSubs=()=>{
      pSub=SB.channel("p").on("postgres_changes",{event:"*",schema:"public",table:"projects"},
        ()=>SB.from("projects").select("*").order("position").then(({data})=>setProjects(data||[]))).subscribe();
      tSub=SB.channel("t").on("postgres_changes",{event:"*",schema:"public",table:"tasks"},
        ()=>SB.from("tasks").select("*").order("created_at",{ascending:false}).limit(500).then(({data})=>setTasks(data||[]))).subscribe();
      eSub=SB.channel("e").on("postgres_changes",{event:"*",schema:"public",table:"events"},
        ()=>SB.from("events").select("*").order("date").then(({data})=>setEvents(data||[]))).subscribe();
    };
    const stopSubs=()=>{
      if(pSub)SB.removeChannel(pSub);
      if(tSub)SB.removeChannel(tSub);
      if(eSub)SB.removeChannel(eSub);
    };
    startSubs();
    const onVis=()=>{
      if(document.hidden){stopSubs();}
      else{
        Promise.all([
          SB.from("projects").select("*").order("position"),
          SB.from("tasks").select("*").order("created_at",{ascending:false}).limit(500),
          SB.from("events").select("*").order("date")
        ]).then(([{data:ps},{data:ts},{data:es}])=>{
          setProjects(ps||[]);setTasks(ts||[]);setEvents(es||[]);
        });
        startSubs();
      }
    };
    document.addEventListener("visibilitychange",onVis);
    return()=>{stopSubs();document.removeEventListener("visibilitychange",onVis);};
  },[]);

  // スクロール実行（scrollTargetが変わった時）
  useEffect(()=>{
    if(!scrollTarget)return;
    const id="day-"+(scrollTarget==="today"?todayISO():scrollTarget);
    const doScroll=()=>{
      const el=document.getElementById(id);
      if(el)el.scrollIntoView({block:"start"});
    };
    const t1=setTimeout(doScroll,300);
    const t2=setTimeout(doScroll,900);
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  },[scrollTarget]);

  // 起動時に今日にスクロール（loadingがfalseになったタイミング）
  useEffect(()=>{
    if(!loading){
      setScrollTarget(null);
      setTimeout(()=>setScrollTarget("today"),50);
    }
  },[loading]);

  const proj=id=>projects.find(p=>p.id===id);

  // プロジェクト操作
  const addProject=async()=>{
    if(!newProjName.trim())return;
    const color=COLORS[projects.length%COLORS.length];
    const {data}=await SB.from("projects").insert({id:uid(),name:newProjName.trim(),color,position:projects.length}).select().single();
    if(data)setProjects(p=>[...p,data]);
    setNewProjName("");setAddingProj(false);
  };
  const delProject=async id=>{
    if(!confirm("削除しますか？"))return;
    await SB.from("projects").delete().eq("id",id);
    setProjects(p=>p.filter(x=>x.id!==id));setTasks(t=>t.filter(x=>x.project_id!==id));
    if(selProj===id)setSelProj(null);
  };
  const renameProject=async(id,name)=>{
    if(!name.trim())return;
    await SB.from("projects").update({name:name.trim()}).eq("id",id);
    setProjects(p=>p.map(x=>x.id===id?{...x,name:name.trim()}:x));
    setEditingProjId(null);
  };

  // タスク操作
  const updateTask=async(id,fields)=>{
    await SB.from("tasks").update(fields).eq("id",id);
    setTasks(t=>t.map(x=>x.id===id?{...x,...fields}:x));
  };
  const handleCheck=task=>{
    if(!task.done)setConfirmTask({...task,type:"done"});
    else updateTask(task.id,{done:false});
  };
  const confirmAction=async()=>{
    if(!confirmTask)return;
    if(confirmTask.type==="done"){
      if(confirmTask.repeat_type){
        const next=nextDeadline(confirmTask.deadline,confirmTask.repeat_type,confirmTask.repeat_value);
        await updateTask(confirmTask.id,{deadline:next,done:false});
      }else{
        await updateTask(confirmTask.id,{done:true});
      }
    }else{
      await SB.from("tasks").delete().eq("id",confirmTask.id);
      setTasks(t=>t.filter(x=>x.id!==confirmTask.id));
    }
    setConfirmTask(null);
  };
  const saveTask=async()=>{
    if(!editTask||!editTask.title.trim())return;
    const fields={
      title:editTask.title.trim(),project_id:editTask.project_id,
      deadline:editTask.deadline||null,repeat_type:editTask.repeat_type||null,
      repeat_value:editTask.repeat_value||null,note:editTask.note||null,
      priority:editTask.priority||0
    };
    const targetDate=editTask.deadline||todayISO();
    if(editTask.id===null){
      const newId=uid();
      const {data}=await SB.from("tasks").insert({id:newId,done:false,...fields}).select().single();
      if(data)setTasks(t=>[data,...t]);
    }else{
      await updateTask(editTask.id,fields);
    }
    setEditTask(null);setNewProjInDialog(false);setNewProjInDialogName("");
    // 保存した期限日にスクロール
    setScrollTarget(null);
    setTimeout(()=>{
      const el=document.getElementById("day-"+targetDate);
      if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
    },150);
  };
  const addProjInDialog=async()=>{
    if(!newProjInDialogName.trim())return;
    const color=COLORS[projects.length%COLORS.length];
    const {data}=await SB.from("projects").insert({id:uid(),name:newProjInDialogName.trim(),color,position:projects.length}).select().single();
    if(data){setProjects(p=>[...p,data]);setEditTask(t=>({...t,project_id:data.id}));}
    setNewProjInDialogName("");setNewProjInDialog(false);
  };
  const uploadImage=async(file,taskId)=>{
    if(!file)return null;
    const ext=file.name.split(".").pop();
    const path=`${taskId}/${uid()}.${ext}`;
    const {error}=await SB.storage.from("attachments").upload(path,file,{upsert:true});
    if(error){alert("アップロード失敗");return null;}
    const {data}=SB.storage.from("attachments").getPublicUrl(path);
    return data.publicUrl;
  };

  // イベント操作
  const saveEvent=async()=>{
    if(!editEvent||!editEvent.title.trim()||!editEvent.date)return;
    const targetDate=editEvent.date;
    const fields={title:editEvent.title.trim(),date:targetDate,time:editEvent.time||null,note:editEvent.note||null};
    if(editEvent.id===null){
      const newEv={id:uid(),...fields};
      const {data}=await SB.from("events").insert(newEv).select().single();
      setEvents(e=>[...e,data||newEv].sort((a,b)=>a.date.localeCompare(b.date)));
    }else{
      await SB.from("events").update(fields).eq("id",editEvent.id);
      setEvents(e=>e.map(x=>x.id===editEvent.id?{...x,...fields}:x));
    }
    setEditEvent(null);
    // 保存した日付にスクロール（今日スクロールより後に実行）
    setScrollTarget(null);
    setTimeout(()=>{
      const el=document.getElementById("day-"+targetDate);
      if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
    },100);
  };
  const delEvent=async id=>{
    await SB.from("events").delete().eq("id",id);
    setEvents(e=>e.filter(x=>x.id!==id));
  };

  // 表示フィルター
  const visibleTasks=tasks.filter(t=>{
    if(selProj&&t.project_id!==selProj)return false;
    if(filter==="active"&&t.done)return false;
    if(filter==="done"&&!t.done)return false;
    return true;
  }).sort((a,b)=>{const da=diffDays(a.deadline)??9999,db=diffDays(b.deadline)??9999;return da-db||new Date(a.created_at)-new Date(b.created_at);});

  const reminders=tasks.filter(t=>!t.done&&!dismissed[t.id]&&(t.priority||0)>0)
    .sort((a,b)=>(b.priority||0)-(a.priority||0)||diffDays(a.deadline)-diffDays(b.deadline));

  const remColor=diff=>{
    if(diff===null||diff>3)return{bg:"#fffbeb",border:"#fde68a",dot:"#f59e0b",text:"#f59e0b"};
    if(diff<=0)return{bg:"#fff5f5",border:"#fecaca",dot:"#ef4444",text:"#ef4444"};
    if(diff<=1)return{bg:"#fff7ed",border:"#fed7aa",dot:"#f97316",text:"#f97316"};
    return{bg:"#fffbeb",border:"#fde68a",dot:"#f59e0b",text:"#f59e0b"};
  };

  const openTaskMenu=t=>{setTaskMenu(t);setShowAddMenu(false);};

  // サイドバー
  const Sidebar=(
    <>
      <div style={{padding:"0 12px 10px",fontWeight:700,fontSize:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>Todo</span>{loading&&<span style={{fontSize:10,color:"#bbb"}}>同期中…</span>}
      </div>
      <div onClick={()=>{setSelProj(null);setReordering(false);setSidebarOpen(false);}}
        style={{display:"flex",alignItems:"center",gap:6,padding:"7px 12px",cursor:"pointer",
        background:!selProj&&!reordering?"#f5f5f5":"transparent",borderRight:`2px solid ${!selProj&&!reordering?"#1a1a1a":"transparent"}`}}>
        <span style={{flex:1,fontSize:12,color:!selProj?"#1a1a1a":"#666",fontWeight:!selProj?600:400}}>すべて</span>
        <span style={{fontSize:10,color:"#bbb"}}>{tasks.filter(t=>!t.done).length}</span>
      </div>
      <div style={{padding:"10px 12px 4px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{fontSize:10,color:"#bbb",textTransform:"uppercase"}}>Projects</span>
        <button onClick={()=>{setReordering(r=>!r);setMovingProjId(null);}}
          style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:reordering?"#6366f1":"#bbb",padding:0}}>
          {reordering?"完了":"並替"}
        </button>
      </div>
      {projects.map((p,i)=>reordering?(
        <div key={p.id} onClick={()=>{
          if(!movingProjId){setMovingProjId(p.id);}
          else if(movingProjId===p.id){setMovingProjId(null);}
          else{
            const fi=projects.findIndex(x=>x.id===movingProjId),ti=i;
            const n=[...projects];const[m]=n.splice(fi,1);n.splice(ti,0,m);
            setProjects(n);setMovingProjId(null);
            Promise.all(n.map((x,idx)=>SB.from("projects").update({position:idx}).eq("id",x.id)));
          }
        }} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",cursor:"pointer",
          background:movingProjId===p.id?"#6366f118":movingProjId?"#fafafa":"#fafafa",
          borderBottom:"1px solid #f0f0f0",border:movingProjId===p.id?"1px solid #6366f1":"1px solid transparent"}}>
          <span style={{fontSize:14,color:"#bbb"}}>≡</span>
          <span style={{width:6,height:6,borderRadius:"50%",background:p.color,flexShrink:0}}/>
          <span style={{flex:1,fontSize:11,color:movingProjId===p.id?"#6366f1":"#444",fontWeight:movingProjId===p.id?700:400}}>{p.name}</span>
          {movingProjId===p.id?<span style={{fontSize:10,color:"#6366f1"}}>移動元✓</span>
            :movingProjId?<span style={{fontSize:10,color:"#aaa"}}>ここへ</span>:null}
        </div>
      ):editingProjId===p.id?(
        <div key={p.id} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 8px 4px 12px",background:"#fafafa"}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:p.color,flexShrink:0}}/>
          <input autoFocus value={editingProjName} onChange={e=>setEditingProjName(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")renameProject(p.id,editingProjName);if(e.key==="Escape")setEditingProjId(null);}}
            style={{flex:1,border:"1px solid #ddd",borderRadius:5,padding:"3px 6px",fontSize:16,outline:"none"}}/>
          <button onClick={()=>renameProject(p.id,editingProjName)}
            style={{background:"#1a1a1a",color:"#fff",border:"none",borderRadius:4,padding:"3px 6px",fontSize:10,cursor:"pointer"}}>保存</button>
          <button onClick={()=>setEditingProjId(null)}
            style={{background:"#f0f0f0",color:"#666",border:"none",borderRadius:4,padding:"3px 6px",fontSize:10,cursor:"pointer"}}>×</button>
        </div>
      ):(
        <div key={p.id} style={{display:"flex",alignItems:"center"}}>
          <div style={{flex:1,display:"flex",alignItems:"center",gap:6,padding:"7px 12px",cursor:"pointer",
            background:selProj===p.id?"#f5f5f5":"transparent",borderRight:`2px solid ${selProj===p.id?"#1a1a1a":"transparent"}`}}
            onClick={()=>{setSelProj(p.id);setSidebarOpen(false);}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:p.color,flexShrink:0}}/>
            <span style={{flex:1,fontSize:12,color:selProj===p.id?"#1a1a1a":"#666",fontWeight:selProj===p.id?600:400,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</span>
            <span style={{fontSize:10,color:"#bbb"}}>{tasks.filter(t=>t.project_id===p.id&&!t.done).length||""}</span>
          </div>
          <button onClick={()=>{setEditingProjId(p.id);setEditingProjName(p.name);}}
            style={{background:"none",border:"none",cursor:"pointer",color:"#ccc",fontSize:11,padding:"0 4px",flexShrink:0}}>✎</button>
          <button onClick={()=>delProject(p.id)}
            style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:12,padding:"0 8px 0 0",flexShrink:0}}>×</button>
        </div>
      ))}
      <div style={{padding:"6px 12px 0"}}>
        {addingProj?(
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <input autoFocus value={newProjName} onChange={e=>setNewProjName(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter")addProject();if(e.key==="Escape")setAddingProj(false);}}
              placeholder="名前を入力" style={{border:"1px solid #ddd",borderRadius:5,padding:"4px 7px",fontSize:16,outline:"none",width:"100%"}}/>
            <div style={{display:"flex",gap:4}}>
              <button onClick={addProject} style={{flex:1,background:"#1a1a1a",color:"#fff",border:"none",borderRadius:5,padding:"4px 0",cursor:"pointer",fontSize:11}}>追加</button>
              <button onClick={()=>setAddingProj(false)} style={{flex:1,background:"#f0f0f0",color:"#888",border:"none",borderRadius:5,padding:"4px 0",cursor:"pointer",fontSize:11}}>×</button>
            </div>
          </div>
        ):(
          <button onClick={()=>setAddingProj(true)} style={{background:"none",border:"none",cursor:"pointer",color:"#bbb",fontSize:11,padding:"2px 0",display:"flex",alignItems:"center",gap:4}}>
            <span>+</span> 追加
          </button>
        )}
      </div>
    </>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",fontSize:12,color:"#1a1a1a"}}>
      <div className="app-center" style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden",background:"#f5f5f5"}}>

      {/* バナー */}
      {reminders.length>0&&showReminders&&(()=>{
        const hi=reminders.filter(t=>t.priority===3);
        const mi=reminders.filter(t=>t.priority===2);
        const lo=reminders.filter(t=>t.priority===1);
        const Item=({t})=>{
          const diff=diffDays(t.deadline),c=remColor(diff),p=proj(t.project_id);
          return(
            <div onClick={()=>openTaskMenu(t)} style={{display:"flex",alignItems:"center",gap:5,background:c.bg,
              border:`1px solid ${c.border}`,borderRadius:6,padding:"3px 8px 3px 6px",fontSize:11,cursor:"pointer",marginBottom:3}}>
              <span style={{width:5,height:5,borderRadius:"50%",background:c.dot,flexShrink:0}}/>
              {p&&<span style={{color:p.color,fontSize:10,flexShrink:0}}>{p.name}・</span>}
              {t.priority>0&&<span style={{fontSize:9,fontWeight:700,
                color:t.priority===3?"#ef4444":t.priority===2?"#f97316":"#10b981",
                background:t.priority===3?"#fef2f2":t.priority===2?"#fff7ed":"#f0fdf4",
                border:`1px solid ${t.priority===3?"#fecaca":t.priority===2?"#fed7aa":"#bbf7d0"}`,
                borderRadius:4,padding:"1px 5px",flexShrink:0}}>{t.priority===3?"高":t.priority===2?"中":"低"}</span>}
              <span style={{color:"#444",flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</span>
              {diff!==null&&<span style={{color:c.text,fontWeight:600,fontSize:10,flexShrink:0}}>
                {diff<0?`${Math.abs(diff)}日超過`:diff===0?"今日":diff===1?"明日":`${diff}日後`}
              </span>}
            </div>
          );
        };
        return(
          <div style={{background:"#fff",borderBottom:"1px solid #e8e8e8"}}>
            <div className="banner-mob" style={{padding:"6px 12px",display:"flex",flexWrap:"wrap",gap:6}}>
              {reminders.map(t=><Item key={t.id} t={t}/>)}
            </div>
            <div className="banner-pc" style={{padding:"6px 12px",gap:8}}>
              {[["高","#ef4444",hi],["中","#f97316",mi],["低","#10b981",lo]].map(([label,color,items])=>(
                <div key={label} style={{flex:1,borderRight:"1px solid #f0f0f0",paddingRight:8}}>
                  <div style={{fontSize:9,fontWeight:700,color,marginBottom:4}}>{label}</div>
                  {items.length===0?<div style={{fontSize:10,color:"#e0e0e0"}}>なし</div>
                    :items.map(t=><Item key={t.id} t={t}/>)}
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      <div style={{display:"flex",flex:1,overflow:"hidden",position:"relative"}}>
        {sidebarOpen&&<div className="sb-overlay" onClick={()=>setSidebarOpen(false)}/>}
        <div className={`sb${sidebarOpen?" open":""}`}>{Sidebar}</div>

        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {/* ヘッダー */}
          <div style={{padding:"6px 10px",borderBottom:"1px solid #e8e8e8",background:"#fff",display:"flex",alignItems:"center",gap:4}}>
            <button className="menu-btn" onClick={()=>setSidebarOpen(true)}
              style={{background:"none",border:"none",cursor:"pointer",fontSize:16,padding:"0 4px 0 0",color:"#888",flexShrink:0}}>☰</button>
            {viewMode==="list"&&<>
              <select value={selProj||""} onChange={e=>{const v=e.target.value;if(v==="__new__"){setAddingProj(true);setSidebarOpen(true);}else setSelProj(v||null);}}
                style={{border:"1px solid #e8e8e8",borderRadius:6,background:"#f9f9f9",fontSize:13,fontWeight:600,color:"#1a1a1a",cursor:"pointer",outline:"none",padding:"5px 8px",flexShrink:0}}>
                <option value="">すべて</option>
                {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                <option value="__new__">＋ 新規作成</option>
              </select>
              <select value={filter} onChange={e=>setFilter(e.target.value)}
                style={{border:"1px solid #e8e8e8",borderRadius:6,background:"#f9f9f9",fontSize:11,color:"#444",cursor:"pointer",outline:"none",padding:"4px 6px",flexShrink:0}}>
                <option value="active">未完了</option>
                <option value="done">完了</option>
                <option value="all">すべて</option>
              </select>
            </>}
            <div style={{flex:1,display:"flex",justifyContent:"center"}}>
              {(()=>{
                const overdue=tasks.filter(t=>{const df=diffDays(t.deadline);return df!==null&&df<0&&!t.done;});
                return overdue.length>0?(
                  <button onClick={()=>setOverdueModal(overdue)}
                    style={{background:"#ef4444",border:"none",borderRadius:20,padding:"3px 12px",
                    fontSize:11,color:"#fff",fontWeight:700,cursor:"pointer"}}>
                    超過 {overdue.length}件
                  </button>
                ):null;
              })()}
            </div>
            <div style={{display:"flex",gap:2}}>
              {[["calonly","📅"],["calendar","📅✓"],["list","☰"]].map(([m,icon])=>(
                <button key={m} onClick={()=>{ setViewMode(m); setScrollTarget(null); setTimeout(()=>setScrollTarget("today"),50); }}
                  style={{background:viewMode===m?"#6366f118":"none",border:`1px solid ${viewMode===m?"#6366f1":"transparent"}`,
                  borderRadius:6,cursor:"pointer",color:viewMode===m?"#6366f1":"#bbb",fontSize:13,padding:"3px 7px",flexShrink:0}}>
                  {icon}
                </button>
              ))}
            </div>
            {reminders.length>0&&(
              <button onClick={()=>setShowReminders(r=>!r)}
                style={{background:"none",border:"none",cursor:"pointer",color:showReminders?"#6366f1":"#bbb",fontSize:14,padding:"0 2px",flexShrink:0}}>
                {showReminders?"🔔":"🔕"}
              </button>
            )}
          </div>

          {/* メインコンテンツ */}
          {viewMode==="calonly"&&(
            <CalView tasks={[]} events={events} proj={proj} daysBack={60} daysForward={90}
              showTasks={false} onTaskClick={openTaskMenu}
              onEventClick={ev=>setEditEvent({...ev})} onOverdueClick={setOverdueModal}
              scrollToRef={calScrollRef}/>
          )}
          {viewMode==="calendar"&&(
            <CalView tasks={visibleTasks} events={events} proj={proj} daysBack={60} daysForward={14}
              showTasks={true} onTaskClick={openTaskMenu}
              onEventClick={ev=>setEditEvent({...ev})} onOverdueClick={setOverdueModal}
              scrollToRef={calScrollRef}/>
          )}
          {viewMode==="list"&&(()=>{
            const noDeadline=visibleTasks.filter(t=>!t.deadline);
            const withDeadline=visibleTasks.filter(t=>t.deadline);
            const groups={};
            withDeadline.forEach(t=>{if(!groups[t.deadline])groups[t.deadline]=[];groups[t.deadline].push(t);});
            const dates=Object.keys(groups).sort();
            const TaskCard=({task})=>{
              const p=proj(task.project_id);
              const pc=task.priority===3?"#ef4444":task.priority===2?"#f97316":task.priority===1?"#10b981":"#e0e0e0";
              const rl=repeatLabel(task.repeat_type,task.repeat_value);
              return(
                <div onClick={()=>openTaskMenu(task)} style={{background:"#f9f9f9",borderRadius:8,padding:"6px 10px",
                  cursor:"pointer",opacity:task.done?.4:1,borderLeft:`3px solid ${pc}`,marginBottom:4}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <button onClick={e=>{e.stopPropagation();handleCheck(task);}}
                      style={{width:14,height:14,borderRadius:"50%",border:`1.5px solid ${task.done?"#10b981":"#ccc"}`,
                      background:task.done?"#10b981":"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>
                      {task.done&&<svg width="7" height="5" viewBox="0 0 10 8"><path d="M1 4l3 3 5-6" stroke="#fff" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                    </button>
                    {p&&<span style={{fontSize:10,color:p.color,background:p.color+"18",padding:"1px 5px",borderRadius:20,flexShrink:0}}>{p.name}</span>}
                    <span style={{fontSize:12,flex:1,textDecoration:task.done?"line-through":"none",color:task.done?"#bbb":"#1a1a1a"}}>{task.title}</span>
                    {task.priority>0&&<span style={{fontSize:9,fontWeight:700,color:pc,flexShrink:0}}>{task.priority===3?"高":task.priority===2?"中":"低"}</span>}
                  </div>
                  {rl&&<div style={{fontSize:10,color:"#6366f1",marginTop:2}}>🔁 {rl}</div>}
                  {task.note&&<div style={{fontSize:10,color:"#999",marginTop:2,whiteSpace:"pre-wrap"}}>{task.note}</div>}
                  {task.image_url&&<img src={task.image_url} alt="" onClick={e=>{e.stopPropagation();window.open(task.image_url,"_blank");}}
                    style={{width:48,height:48,objectFit:"cover",borderRadius:6,marginTop:4,display:"block",cursor:"pointer"}}/>}
                </div>
              );
            };
            return(
              <div style={{flex:1,overflowY:"auto",padding:"8px 12px 100px"}}>
                {loading&&<div style={{padding:12}}>{[1,2,3,4,5].map(i=><div key={i} style={{height:52,background:"#f0f0f0",borderRadius:8,marginBottom:8,opacity:1-i*.15}}/>)}</div>}
                {!loading&&visibleTasks.length===0&&<div style={{textAlign:"center",padding:"50px 0",color:"#ddd"}}><div style={{fontSize:24,marginBottom:8}}>✓</div><div style={{fontSize:11}}>タスクがありません</div></div>}
                {dates.map(dateStr=>{
                  const d=new Date(dateStr+"T00:00:00");
                  const isToday=dateStr===todayISO();
                  const isSun=d.getDay()===0,isSat=d.getDay()===6,isHol=!!HOLIDAYS[dateStr];
                  const dc=isToday?"#fff":(isSun||isHol)?"#ef4444":isSat?"#3b82f6":"#1a1a1a";
                  return(
                    <div key={dateStr}>
                      <div style={{display:"flex",alignItems:"center",gap:8,margin:"8px 0 6px"}}>
                        <div onClick={()=>setEditEvent({id:null,title:"",date:dateStr,time:"",note:""})}
                          style={{display:"inline-flex",alignItems:"center",gap:5,background:isToday?"#1a1a1a":"transparent",
                          borderRadius:6,padding:isToday?"2px 10px":"2px 0",cursor:"pointer"}}>
                          <span style={{fontSize:14,fontWeight:700,color:dc}}>{d.getMonth()+1}/{d.getDate()}</span>
                          <span style={{fontSize:10,color:isToday?"#aaa":(isSun||isHol)?"#ef4444":isSat?"#3b82f6":"#bbb"}}>{WD[d.getDay()]}{isHol?" 🎌":""}</span>
                        </div>
                      </div>
                      {groups[dateStr].sort((a,b)=>(b.priority||0)-(a.priority||0)).map(t=><TaskCard key={t.id} task={t}/>)}
                      <div style={{height:1,background:"#f0f0f0",marginBottom:4}}/>
                    </div>
                  );
                })}
                {noDeadline.length>0&&<>
                  <div style={{fontSize:11,color:"#bbb",margin:"12px 0 6px",fontWeight:600}}>期限なし</div>
                  {noDeadline.sort((a,b)=>(b.priority||0)-(a.priority||0)).map(t=><TaskCard key={t.id} task={t}/>)}
                </>}
              </div>
            );
          })()}
        </div>
      </div>

      {/* 下部ボタン */}
      <div style={{position:"fixed",bottom:20,right:16,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8,zIndex:50}}>
        {showAddMenu&&(
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:4}}>
            <button onClick={()=>{setEditEvent({id:null,title:"",date:todayISO(),time:"",note:""});setShowAddMenu(false);}}
              style={{display:"flex",alignItems:"center",gap:8,background:"#fff",border:"1.5px solid #ddd",borderRadius:24,
              padding:"10px 18px 10px 14px",fontSize:13,cursor:"pointer",boxShadow:"0 2px 12px rgba(0,0,0,.12)",fontWeight:600,color:"#444",whiteSpace:"nowrap"}}>
              <span style={{fontSize:16}}>📅</span> 予定を追加
            </button>
            <button onClick={()=>{setEditTask({id:null,title:"",deadline:todayISO(),repeat_type:"",repeat_value:"",image_url:null,project_id:selProj||(projects[0]?.id||""),note:"",priority:0});setShowAddMenu(false);}}
              style={{display:"flex",alignItems:"center",gap:8,background:"#1a1a1a",border:"none",borderRadius:24,
              padding:"10px 18px 10px 14px",fontSize:13,cursor:"pointer",boxShadow:"0 2px 12px rgba(0,0,0,.2)",fontWeight:600,color:"#fff",whiteSpace:"nowrap"}}>
              <span style={{fontSize:16}}>✓</span> タスクを追加
            </button>
          </div>
        )}
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>{setScrollTarget(null);setTimeout(()=>setScrollTarget("today"),10);}}
            style={{width:36,height:36,borderRadius:"50%",background:"#fff",color:"#1a1a1a",border:"1.5px solid #ddd",
            fontSize:10,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>TODAY</button>
          <button onClick={()=>window.location.reload()}
            style={{width:36,height:36,borderRadius:"50%",background:"#fff",color:"#888",border:"1.5px solid #ddd",
            fontSize:16,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,.1)",display:"flex",alignItems:"center",justifyContent:"center"}}>↻</button>
          <button onClick={()=>setShowAddMenu(m=>!m)}
            style={{width:48,height:48,borderRadius:"50%",background:showAddMenu?"#555":"#1a1a1a",color:"#fff",border:"none",
            fontSize:24,cursor:"pointer",boxShadow:"0 4px 12px rgba(0,0,0,.2)",display:"flex",alignItems:"center",justifyContent:"center",
            transition:"transform .2s",transform:showAddMenu?"rotate(45deg)":"rotate(0deg)"}}>+</button>
        </div>
      </div>

      {/* タスクメニュー */}
      {taskMenu&&(
        <div className="dlg-wrap" onClick={()=>setTaskMenu(null)}>
          <div className="dlg-inner" style={{borderRadius:"16px 16px 0 0",maxHeight:"50vh"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:13,fontWeight:600,color:"#1a1a1a",marginBottom:4}}>{taskMenu.title}</div>
            {taskMenu.project_id&&proj(taskMenu.project_id)&&(
              <div style={{fontSize:11,color:proj(taskMenu.project_id).color,marginBottom:16}}>{proj(taskMenu.project_id).name}</div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={()=>{setEditTask({id:taskMenu.id,title:taskMenu.title,deadline:taskMenu.deadline||"",repeat_type:taskMenu.repeat_type||"",repeat_value:taskMenu.repeat_value||"",image_url:taskMenu.image_url||null,project_id:taskMenu.project_id,note:taskMenu.note||"",priority:taskMenu.priority||0});setTaskMenu(null);}}
                style={{background:"#f9f9f9",border:"none",borderRadius:10,padding:"14px",fontSize:14,cursor:"pointer",color:"#1a1a1a",textAlign:"left"}}>✎　編集</button>
              <button onClick={()=>{handleCheck(taskMenu);setTaskMenu(null);}}
                style={{background:taskMenu.done?"#f0fdf4":"#f9f9f9",border:"none",borderRadius:10,padding:"14px",fontSize:14,cursor:"pointer",color:taskMenu.done?"#10b981":"#1a1a1a",textAlign:"left"}}>
                {taskMenu.done?"↩　未完了に戻す":"✓　完了にする"}
              </button>
              <button onClick={()=>{setConfirmTask({...taskMenu,type:"delete"});setTaskMenu(null);}}
                style={{background:"#fff5f5",border:"none",borderRadius:10,padding:"14px",fontSize:14,cursor:"pointer",color:"#ef4444",textAlign:"left"}}>×　削除</button>
            </div>
            <button onClick={()=>setTaskMenu(null)} style={{marginTop:12,width:"100%",background:"#f0f0f0",border:"none",borderRadius:10,padding:"12px",fontSize:13,cursor:"pointer",color:"#666"}}>キャンセル</button>
          </div>
        </div>
      )}

      {/* 超過タスクモーダル */}
      {overdueModal&&(
        <div className="dlg-wrap" style={{alignItems:"center"}} onClick={()=>setOverdueModal(null)}>
          <div className="dlg-inner" style={{borderRadius:14,width:"min(300px,90vw)",maxHeight:"70vh"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:13,fontWeight:600,color:"#ef4444",marginBottom:12}}>期限超過 ({overdueModal.length}件)</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {overdueModal.sort((a,b)=>(b.priority||0)-(a.priority||0)).map(task=>{
                const p=proj(task.project_id),diff=diffDays(task.deadline);
                const pc=task.priority===3?"#ef4444":task.priority===2?"#f97316":task.priority===1?"#10b981":"#ccc";
                return(
                  <div key={task.id} onClick={()=>{openTaskMenu(task);setOverdueModal(null);}}
                    style={{padding:"8px 10px",background:"#fef2f2",borderRadius:8,borderLeft:`3px solid ${pc}`,cursor:"pointer"}}>
                    <div style={{fontSize:12,color:"#1a1a1a",marginBottom:2}}>{task.title}</div>
                    <div style={{display:"flex",gap:6}}>
                      {p&&<span style={{fontSize:10,color:p.color}}>{p.name}</span>}
                      <span style={{fontSize:10,color:"#ef4444",fontWeight:600}}>{Math.abs(diff)}日超過</span>
                    </div>
                  </div>
                );
              })}
            </div>
            <button onClick={()=>setOverdueModal(null)} style={{marginTop:16,width:"100%",background:"#f0f0f0",border:"none",borderRadius:8,padding:"10px 0",fontSize:12,cursor:"pointer",color:"#666"}}>閉じる</button>
          </div>
        </div>
      )}

      {/* イベント編集ダイアログ */}
      {editEvent&&(
        <div className="dlg-wrap" onClick={()=>setEditEvent(null)}>
          <div className="dlg-inner" onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:13,fontWeight:600,color:"#1a1a1a",marginBottom:16}}>{editEvent.id?"予定を編集":"予定を追加"}</div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div>
                <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>イベント名</div>
                <input value={editEvent.title} onChange={e=>setEditEvent(t=>({...t,title:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&saveEvent()}
                  style={{width:"100%",border:"1px solid #ddd",borderRadius:8,padding:"8px 10px",fontSize:16,outline:"none",boxSizing:"border-box"}}/>
              </div>
              <div>
                <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>日付</div>
                <input type="date" value={editEvent.date} onChange={e=>setEditEvent(t=>({...t,date:e.target.value}))}
                  style={{width:"100%",border:"1px solid #ddd",borderRadius:8,padding:"8px 10px",fontSize:16,outline:"none",color:"#666",boxSizing:"border-box"}}/>
              </div>
              <div>
                <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>開始時刻（任意）</div>
                <select value={editEvent.time||""} onChange={e=>setEditEvent(t=>({...t,time:e.target.value}))}
                  style={{width:"100%",border:"1px solid #ddd",borderRadius:8,padding:"8px 10px",fontSize:16,outline:"none",color:"#666",boxSizing:"border-box",background:"#fff"}}>
                  <option value="">時刻なし</option>
                  {Array.from({length:24*2},(_,i)=>{const h=Math.floor(i/2),m=(i%2)*30;const v=`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;return<option key={v} value={v}>{v}</option>;})}
                </select>
              </div>
              <div>
                <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>メモ</div>
                <textarea value={editEvent.note||""} onChange={e=>setEditEvent(t=>({...t,note:e.target.value}))} placeholder="メモを入力..." rows={3}
                  style={{width:"100%",border:"1px solid #ddd",borderRadius:8,padding:"8px 10px",fontSize:16,outline:"none",boxSizing:"border-box",resize:"vertical",fontFamily:"inherit",color:"#444"}}/>
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:20}}>
              {editEvent.id&&<button onClick={()=>{if(confirm("削除しますか？")){delEvent(editEvent.id);setEditEvent(null);}}}
                style={{background:"#fff5f5",border:"none",borderRadius:8,padding:"10px 0",fontSize:12,cursor:"pointer",color:"#ef4444",width:52}}>削除</button>}
              <button onClick={()=>setEditEvent(null)} style={{flex:1,background:"#f0f0f0",border:"none",borderRadius:8,padding:"10px 0",fontSize:12,cursor:"pointer",color:"#666"}}>キャンセル</button>
              <button onClick={saveEvent} style={{flex:1,background:"#1a1a1a",border:"none",borderRadius:8,padding:"10px 0",fontSize:12,cursor:"pointer",color:"#fff",fontWeight:600}}>保存</button>
            </div>
          </div>
        </div>
      )}

      {/* タスク編集ダイアログ */}
      {editTask&&(
        <div className="dlg-wrap" onClick={()=>{setEditTask(null);setNewProjInDialog(false);setNewProjInDialogName("");}}>
          <div className="dlg-inner" onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:13,fontWeight:600,color:"#1a1a1a",marginBottom:16}}>{editTask.id?"タスクを編集":"タスクを追加"}</div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>タスク名</div>
                  <input value={editTask.title} onChange={e=>setEditTask(t=>({...t,title:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&saveTask()}
                    placeholder="タスク名を入力"
                    style={{width:"100%",border:"1px solid #ddd",borderRadius:8,padding:"8px 10px",fontSize:16,outline:"none",boxSizing:"border-box"}}/>
                </div>
                <button onClick={saveTask} style={{background:"#1a1a1a",border:"none",borderRadius:8,padding:"10px 14px",fontSize:12,cursor:"pointer",color:"#fff",fontWeight:600,flexShrink:0,alignSelf:"flex-end"}}>保存</button>
              </div>
              <div>
                <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>プロジェクト</div>
                {newProjInDialog?(
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    <input autoFocus value={newProjInDialogName} onChange={e=>setNewProjInDialogName(e.target.value)}
                      onKeyDown={e=>{if(e.key==="Enter")addProjInDialog();if(e.key==="Escape")setNewProjInDialog(false);}}
                      placeholder="プロジェクト名" style={{width:"100%",border:"1px solid #6366f1",borderRadius:8,padding:"8px 10px",fontSize:16,outline:"none",boxSizing:"border-box"}}/>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={addProjInDialog} style={{flex:1,background:"#6366f1",color:"#fff",border:"none",borderRadius:8,padding:"8px 0",fontSize:12,cursor:"pointer",fontWeight:600}}>作成して選択</button>
                      <button onClick={()=>{setNewProjInDialog(false);setNewProjInDialogName("");}} style={{background:"#f0f0f0",color:"#666",border:"none",borderRadius:8,padding:"8px 12px",fontSize:12,cursor:"pointer"}}>×</button>
                    </div>
                  </div>
                ):(
                  <div style={{display:"flex",gap:6}}>
                    <select value={editTask.project_id||""} onChange={e=>setEditTask(t=>({...t,project_id:e.target.value}))}
                      size={Math.min(projects.length,5)}
                      style={{flex:1,border:"1px solid #ddd",borderRadius:8,padding:"4px",fontSize:16,outline:"none",color:"#666",background:"#fff",minHeight:80}}>
                      {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                    </select>
                    <button onClick={()=>setNewProjInDialog(true)} style={{background:"#f0f0ff",border:"1px solid #6366f1",borderRadius:8,padding:"8px 10px",fontSize:11,cursor:"pointer",color:"#6366f1",flexShrink:0,alignSelf:"flex-start"}}>＋新規</button>
                  </div>
                )}
              </div>
              <div>
                <div style={{fontSize:11,color:"#aaa",marginBottom:6}}>重要度</div>
                <div style={{display:"flex",gap:8}}>
                  {[[0,"なし","#ccc"],[1,"低","#10b981"],[2,"中","#f97316"],[3,"高","#ef4444"]].map(([val,label,color])=>(
                    <button key={val} onClick={()=>setEditTask(t=>({...t,priority:val}))}
                      style={{flex:1,padding:"6px 0",borderRadius:8,border:`1.5px solid ${editTask.priority===val?color:"#e8e8e8"}`,
                      background:editTask.priority===val?color+"18":"transparent",color:editTask.priority===val?color:"#aaa",
                      fontSize:11,cursor:"pointer",fontWeight:editTask.priority===val?600:400}}>{label}</button>
                  ))}
                </div>
              </div>
              <div>
                <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>期限</div>
                <input type="date" value={editTask.deadline} onChange={e=>setEditTask(t=>({...t,deadline:e.target.value}))}
                  style={{width:"100%",border:"1px solid #ddd",borderRadius:8,padding:"8px 10px",fontSize:16,outline:"none",color:"#666",boxSizing:"border-box"}}/>
              </div>
              <div>
                <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>メモ</div>
                <textarea value={editTask.note} onChange={e=>setEditTask(t=>({...t,note:e.target.value}))} placeholder="メモを入力..." rows={3}
                  style={{width:"100%",border:"1px solid #ddd",borderRadius:8,padding:"8px 10px",fontSize:16,outline:"none",boxSizing:"border-box",resize:"vertical",fontFamily:"inherit",color:"#444"}}/>
              </div>
              <RepeatSel rType={editTask.repeat_type} setRType={v=>setEditTask(t=>({...t,repeat_type:v,repeat_value:""}))} rVal={editTask.repeat_value} setRVal={v=>setEditTask(t=>({...t,repeat_value:v}))}/>
              <div>
                <div style={{fontSize:11,color:"#aaa",marginBottom:6}}>画像</div>
                {editTask.image_url?(
                  <div style={{position:"relative",display:"inline-block",width:"100%"}}>
                    <img src={editTask.image_url} alt="" onClick={()=>window.open(editTask.image_url,"_blank")}
                      style={{width:"100%",borderRadius:8,maxHeight:160,objectFit:"cover",cursor:"pointer"}}/>
                    <button onClick={async()=>{await updateTask(editTask.id,{image_url:null});setEditTask(t=>({...t,image_url:null}));}}
                      style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.5)",border:"none",borderRadius:"50%",width:22,height:22,color:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                  </div>
                ):(
                  <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,border:"1px dashed #ddd",borderRadius:8,padding:"12px",cursor:"pointer",color:"#aaa",fontSize:12}}>
                    {imageUploading?"アップロード中...":"📷 画像を追加"}
                    <input type="file" accept="image/*" style={{display:"none"}} disabled={imageUploading} onChange={async e=>{
                      const file=e.target.files[0];if(!file||!editTask)return;
                      setImageUploading(true);
                      const url=await uploadImage(file,editTask.id||uid());
                      if(url){await updateTask(editTask.id,{image_url:url});setEditTask(t=>({...t,image_url:url}));}
                      setImageUploading(false);
                    }}/>
                  </label>
                )}
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:20}}>
              <button onClick={()=>{setEditTask(null);setNewProjInDialog(false);setNewProjInDialogName("");}}
                style={{flex:1,background:"#f0f0f0",border:"none",borderRadius:8,padding:"10px 0",fontSize:12,cursor:"pointer",color:"#666"}}>キャンセル</button>
              <button onClick={saveTask}
                style={{flex:1,background:"#1a1a1a",border:"none",borderRadius:8,padding:"10px 0",fontSize:12,cursor:"pointer",color:"#fff",fontWeight:600}}>保存</button>
            </div>
          </div>
        </div>
      )}

      {/* 完了・削除確認 */}
      {confirmTask&&(
        <div className="dlg-wrap" style={{alignItems:"center"}} onClick={()=>setConfirmTask(null)}>
          <div className="dlg-inner" style={{borderRadius:14,width:"min(260px,90vw)",textAlign:"center",maxHeight:"none",padding:"24px 20px"}} onClick={e=>e.stopPropagation()}>
            {confirmTask.type==="done"
              ?<div style={{fontSize:13,fontWeight:600,color:"#1a1a1a",marginBottom:6}}>{confirmTask.repeat_type?"完了して次の期限へ？":"完了にしますか？"}</div>
              :<div style={{fontSize:13,fontWeight:600,color:"#ef4444",marginBottom:6}}>削除しますか？</div>}
            <div style={{fontSize:12,color:"#888",marginBottom:4,lineHeight:1.5}}>{confirmTask.title}</div>
            {confirmTask.type==="done"&&confirmTask.repeat_type&&(
              <div style={{fontSize:11,color:"#6366f1",marginBottom:12}}>
                🔁 次の期限: {nextDeadline(confirmTask.deadline,confirmTask.repeat_type,confirmTask.repeat_value)||"—"}
              </div>
            )}
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <button onClick={()=>setConfirmTask(null)} style={{flex:1,background:"#f0f0f0",border:"none",borderRadius:8,padding:"10px 0",fontSize:12,cursor:"pointer",color:"#666"}}>キャンセル</button>
              <button onClick={confirmAction} style={{flex:1,background:confirmTask.type==="done"?"#1a1a1a":"#ef4444",border:"none",borderRadius:8,padding:"10px 0",fontSize:12,cursor:"pointer",color:"#fff",fontWeight:600}}>
                {confirmTask.type==="done"?(confirmTask.repeat_type?"完了・更新":"完了"):"削除"}
              </button>
            </div>
          </div>
        </div>
      )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
